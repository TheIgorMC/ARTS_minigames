<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Starfinder Player Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00f3ff;
            --bg-color: #0a0a12;
            --panel-bg: rgba(0, 243, 255, 0.05);
            --alert-color: #ff3333;
        }
        
        * { box-sizing: border-box; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            color: var(--primary-color); 
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Login Screen */
        #login-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            border: 1px solid var(--primary-color);
            padding: 40px;
            background: rgba(0, 243, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
            text-align: center;
        }

        .login-input {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px;
            margin: 10px 0;
            font-family: inherit;
            font-size: 1.2rem;
            width: 200px;
            text-align: center;
        }
        
        .login-input:focus { outline: none; box-shadow: 0 0 10px var(--primary-color); }

        /* User Menu */
        #user-menu {
            position: absolute;
            top: 0; right: -100%; /* Hidden by default */
            width: 85%;
            height: 100%;
            background: rgba(10, 10, 18, 0.95);
            border-left: 2px solid var(--primary-color);
            z-index: 50;
            transition: right 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
            overflow-y: auto;
        }
        #user-menu.open { right: 0; }
        
        .menu-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--primary-color);
            padding-bottom: 10px; margin-bottom: 20px;
        }
        .close-btn { font-size: 1.5rem; cursor: pointer; }
        
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid #333; padding: 5px 0; }
        .stat-label { color: #888; }
        .stat-val { font-weight: bold; color: var(--primary-color); }
        
        .section-title { margin-top: 20px; color: var(--primary-color); border-bottom: 1px solid var(--primary-color); font-size: 1.1rem; margin-bottom: 10px; }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Header Futuristico */
        header {
            background: rgba(0, 243, 255, 0.1);
            border-bottom: 1px solid var(--primary-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            z-index: 3;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-title { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        .header-time { font-size: 1rem; color: var(--primary-color); font-weight: bold; letter-spacing: 1px; }

        .connection-status {
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 5px var(--primary-color);
        }

        /* Chat Overlay (Legacy - Removed) */
        /* 
        #chat-overlay { ... }
        .chat-messages { ... }
        .chat-msg { ... }
        */

        /* Main Content */
        main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 3;
        }

        /* Buttons */
        .btn {
            background: var(--panel-bg);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 15px 30px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 300px;
            margin: 10px 0;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            text-shadow: 0 0 5px var(--primary-color);
        }

        .btn:active {
            background: var(--primary-color);
            color: #000;
        }

        /* Alert State */
        body.alert-red {
            --primary-color: #ff3333;
            --panel-bg: rgba(255, 51, 51, 0.1);
        }
        
        body.alert-red .status-dot {
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        #controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .terminal-text {
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 5px var(--primary-color);
        }

        /* Cyber Effects */
        .success-box {
            border: 2px solid #0f0;
            padding: 30px;
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            text-align: center;
            position: relative;
        }

        /* Chat Overlay (Legacy - can be removed if unused, but keeping for safety) */
        #chat-overlay {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 60%;
            background: rgba(10, 10, 18, 0.95);
            border-top: 2px solid var(--primary-color);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        #chat-overlay.open { transform: translateY(0); }
        
        /* Chat Messages Container */
        .chat-messages {
            flex: 1;
            min-height: 0; /* Important for nested flex scrolling */
            overflow-y: auto;
            margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 10px;
            padding: 10px;
            border: 1px solid var(--primary-color);
            background: rgba(0, 0, 0, 0.3);
        }
        
        .chat-msg {
            padding: 8px 12px;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
            font-size: 0.9rem;
            line-height: 1.4;
            clear: both;
            margin-bottom: 5px;
        }
        
        .chat-msg.player {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.3);
            align-self: flex-start;
        }

        .chat-msg.me {
            background: rgba(0, 243, 255, 0.2);
            border: 1px solid var(--primary-color);
            text-align: right;
            align-self: flex-end;
        }
        
        .chat-msg.gm {
            background: rgba(255, 200, 0, 0.1);
            border: 1px solid rgba(255, 200, 0, 0.5);
            color: #ffcc00;
            align-self: flex-start;
        }
        
        .chat-input-area {
            display: flex; gap: 10px;
        }
        .chat-input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px;
            font-family: inherit;
        }

        /* --- NEW UI STRUCTURE --- */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            z-index: 10; /* Ensure it's above scanlines */
        }
        .screen.active { display: flex; }

        #bottom-nav {
            height: 60px;
            background: rgba(10, 10, 18, 0.95);
            border-top: 1px solid var(--primary-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 50;
        }
        
        .nav-btn {
            background: transparent;
            border: none;
            color: #555;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            padding: 10px 20px;
            transition: color 0.3s;
        }
        .nav-btn.active {
            color: var(--primary-color);
            text-shadow: 0 0 5px var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Contact List */
        .contact-list {
            padding: 20px;
            overflow-y: auto;
        }
        .contact-item {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .contact-item:hover {
            background: rgba(0, 243, 255, 0.15);
        }
        .contact-name { font-weight: bold; font-size: 1.1rem; }
        .last-msg { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-badge {
            background: var(--primary-color);
            color: #000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            opacity: 0;
        }
        .unread-badge.visible { opacity: 1; }

        /* Chat View (replaces overlay) */
        #chat-view {
            display: none; /* Hidden by default, shown when a contact is selected */
            flex-direction: column;
            height: 100%;
        }
        #chat-view.active { display: flex; }
        
        .chat-header {
            padding: 10px;
            border-bottom: 1px solid var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 243, 255, 0.1);
        }
        .back-btn { font-size: 1.5rem; cursor: pointer; padding: 0 10px; }

    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <h1 class="header-title">S.I.T. ACCESS</h1>
            <input type="text" id="username" class="login-input" placeholder="USERNAME">
            <br>
            <input type="password" id="password" class="login-input" placeholder="PASSWORD">
            <br>
            <button class="btn" onclick="attemptLogin()">LOGIN</button>
            <p id="login-msg" style="color: red; margin-top: 10px;"></p>
        </div>
    </div>

    <header>
        <div class="header-left">
            <div class="header-title">S.I.T. LINK</div>
            <div class="header-time" id="header-time">--:--</div>
        </div>
        <div class="connection-status">
            <span id="char-name-display">GUEST</span>
            <div class="status-dot"></div>
        </div>
    </header>

    <!-- APP CONTAINER -->
    <div id="app-container" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;">
        
        <!-- HOME SCREEN -->
        <div id="screen-home" class="screen active">
            <main style="flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow-y: auto;">
                <div id="controls">
                    <div class="terminal-text">
                        > SYSTEM INITIALIZED<br>
                        > WAITING FOR COMMAND...
                    </div>
                </div>
            </main>
        </div>

        <!-- COMMS SCREEN -->
        <div id="screen-comms" class="screen">
            <!-- CONTACT LIST -->
            <div id="contact-list-view" style="flex:1; display:flex; flex-direction:column;">
                <div class="section-title" style="padding: 10px 20px; margin: 0;">CHANNELS</div>
                <div class="contact-list">
                    <div class="contact-item" onclick="openChat('global')">
                        <div style="flex: 1;">
                            <div class="contact-name">GLOBAL FREQUENCY</div>
                            <div class="last-msg" id="preview-global">System Ready</div>
                        </div>
                        <div class="unread-badge" id="badge-global"></div>
                    </div>
                </div>
            </div>

            <!-- CHAT CONVERSATION -->
            <div id="chat-view">
                <div class="chat-header">
                    <span class="back-btn" onclick="closeChat()">‹</span>
                    <span class="header-title" id="chat-title">GLOBAL</span>
                </div>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-area" style="padding:10px; background: rgba(0,0,0,0.8);">
                    <input type="text" id="chat-input" class="chat-input" placeholder="Message...">
                    <button class="btn" style="width: auto; padding: 10px 20px; margin: 0;" onclick="sendChat()">SEND</button>
                </div>
            </div>
        </div>

        <!-- STATS SCREEN -->
        <div id="screen-stats" class="screen" style="overflow-y: auto; padding: 20px;">
            <div class="section-title">VITALS</div>
            <div class="stat-row"><span class="stat-label">STAMINA</span><span class="stat-val" id="val-sp">0/0</span></div>
            <div class="stat-row"><span class="stat-label">HEALTH</span><span class="stat-val" id="val-hp">0/0</span></div>
            <div class="stat-row"><span class="stat-label">RESOLVE</span><span class="stat-val" id="val-rp">0/0</span></div>

            <div class="section-title">ATTRIBUTES</div>
            <div class="stat-row"><span class="stat-label">STR</span><span class="stat-val" id="val-str">10</span></div>
            <div class="stat-row"><span class="stat-label">DEX</span><span class="stat-val" id="val-dex">10</span></div>
            <div class="stat-row"><span class="stat-label">CON</span><span class="stat-val" id="val-con">10</span></div>
            <div class="stat-row"><span class="stat-label">INT</span><span class="stat-val" id="val-int">10</span></div>
            <div class="stat-row"><span class="stat-label">WIS</span><span class="stat-val" id="val-wis">10</span></div>
            <div class="stat-row"><span class="stat-label">CHA</span><span class="stat-val" id="val-cha">10</span></div>
        </div>

        <!-- EQUIPMENT SCREEN -->
        <div id="screen-equipment" class="screen" style="overflow-y: auto; padding: 20px;">
            <div class="section-title">ASSETS</div>
            <div class="stat-row"><span class="stat-label">CREDITS</span><span class="stat-val" id="val-credits">0</span></div>
            
            <div class="section-title">INVENTORY</div>
            <div id="inventory-list" style="color: #888; font-style: italic;">No items loaded.</div>
        </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav">
        <button class="nav-btn active" id="nav-home" onclick="switchScreen('home')">HOME</button>
        <button class="nav-btn" id="nav-comms" onclick="switchScreen('comms')">COMMS <span id="nav-badge" class="unread-badge" style="display:none; width:10px; height:10px; margin-left:5px;"></span></button>
        <button class="nav-btn" id="nav-stats" onclick="switchScreen('stats')">STATS</button>
        <button class="nav-btn" id="nav-equipment" onclick="switchScreen('equipment')">EQUIP</button>
    </nav>

    <script>
        const socket = io();
        let myCharacter = null;
        let conversations = [];

        // --- LOGIN LOGIC ---
        function attemptLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u && p) {
                localStorage.setItem('sit_user', u);
                localStorage.setItem('sit_pass', p);
                socket.emit('player_login', { username: u, password: p });
            }
        }

        // Auto-Login
        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('sit_user');
            const savedPass = localStorage.getItem('sit_pass');
            if (savedUser && savedPass) {
                document.getElementById('username').value = savedUser;
                document.getElementById('password').value = savedPass;
                attemptLogin();
            }
        });

        socket.on('login_success', (charData) => {
            myCharacter = charData;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('char-name-display').innerText = charData.name.toUpperCase();
            document.getElementById('menu-char-name').innerText = charData.name.toUpperCase();
            
            updateStats(charData);
        });

        socket.on('login_error', (msg) => {
            document.getElementById('login-msg').innerText = msg;
        });

        function updateStats(char) {
            // Vitals
            document.getElementById('val-sp').innerText = (char.vitals?.sp || 0) + '/' + (char.vitals?.max_sp || 0);
            document.getElementById('val-hp').innerText = (char.vitals?.hp || 0) + '/' + (char.vitals?.max_hp || 0);
            document.getElementById('val-rp').innerText = (char.vitals?.rp || 0) + '/' + (char.vitals?.max_rp || 0);
            
            // Stats
            document.getElementById('val-str').innerText = char.stats?.STR || 10;
            document.getElementById('val-dex').innerText = char.stats?.DEX || 10;
            document.getElementById('val-con').innerText = char.stats?.CON || 10;
            document.getElementById('val-int').innerText = char.stats?.INT || 10;
            document.getElementById('val-wis').innerText = char.stats?.WIS || 10;
            document.getElementById('val-cha').innerText = char.stats?.CHA || 10;

            // Assets
            document.getElementById('val-credits').innerText = char.credits;
        }

        // --- GAME LOGIC ---
        
        // Identificati come PLAYER (Generico, poi il login fa il resto)
        // socket.emit('join', 'player'); // Spostato nella logica di login lato server

        const controlsDiv = document.getElementById('controls');
        const statusDot = document.querySelector('.status-dot');
        const statusText = document.querySelector('.connection-status span');

        // Ascolta istruzioni dal GM
        socket.on('player_instruction', (data) => {
            console.log('Istruzione ricevuta:', data);
            
            if (data.type === 'hacking_keypad') {
                renderKeypad();
            } else if (data.type === 'alert') {
                document.body.className = 'alert-red';
                controlsDiv.innerHTML = '<h1 class="terminal-text" style="font-size: 2rem;">⚠ WARNING ⚠</h1><p class="terminal-text">IMMINENT COLLISION DETECTED</p>';
            } else if (data.type === 'reset') {
                document.body.className = '';
                controlsDiv.innerHTML = '<div class="terminal-text">> SYSTEM NORMAL<br>> STANDBY...</div>';
            }
        });

        // Hacking Minigame Update
        socket.on('player_hacking_update', (state) => {
            if (!state.active) return;
            
            // Check target
            if (state.target && state.target !== 'all') {
                if (!myCharacter || myCharacter.username !== state.target) {
                    return; // Not for me
                }
            }
            
            let html = `
                <div style="text-align: center; width: 100%;">
                    <h2 class="terminal-text" style="color: var(--primary-color); border-bottom: 1px solid var(--primary-color); padding-bottom: 10px;">>> DECRYPTION IN PROGRESS <<</h2>
                    
                    <div style="font-size: 3rem; letter-spacing: 10px; margin: 40px 0; font-family: monospace; text-shadow: 0 0 10px var(--primary-color);">
                        ${state.maskedPassword.split('').join(' ')}
                    </div>
                    
                    <div style="display: flex; justify-content: space-around; margin-top: 30px;">
                        <div class="stat-box">
                            <div class="stat-label">ATTEMPTS</div>
                            <div class="stat-val" style="font-size: 2rem;">${state.attempts}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">STATUS</div>
                            <div class="stat-val" style="font-size: 2rem; color: ${state.maskedPassword.includes('*') ? 'orange' : '#0f0'}">
                                ${state.maskedPassword.includes('*') ? 'LOCKED' : 'UNLOCKED'}
                            </div>
                        </div>
                    </div>
                    
                    <div class="terminal-text" style="margin-top: 40px; font-size: 0.9rem; color: #888;">
                        > WAITING FOR MANUAL OVERRIDE INPUT...<br>
                        > SYNCING WITH EXTERNAL DEVICE (D20)...
                    </div>
                </div>
            `;
            controlsDiv.innerHTML = html;
        });

        socket.on('player_hacking_result', (res) => {
            if (!res.success) {
                controlsDiv.innerHTML = `<h1 style="color: red; font-size: 3rem;">${res.message}</h1>`;
                setTimeout(() => {
                    // Restore previous state if needed, or wait for GM
                }, 2000);
            }
        });

        // --- CIRCLE MINIGAME ---
        socket.on('start_minigame', (config) => {
            // Check target
            if (config.target && config.target !== 'all') {
                if (!myCharacter || myCharacter.username !== config.target) {
                    return; // Not for me
                }
            }

            if (config.type === 'CIRCLE') {
                setNavEnabled(false);
                startCircleMinigame(config.difficulty, config.margin, config.rings);
            }
        });

        function startCircleMinigame(difficulty, margin, numRings = 3) {
            // Difficulty: 0 (Easy) to 10 (Hard). Margin: Higher is better.
            // Base speed: 0.02. Speed increases with difficulty.
            // Gap size: 0.5 rad. Gap decreases with difficulty.
            
            // REDUCED SPEED: Multiplier changed from 0.005 to 0.002, base from 0.02 to 0.01
            const speedBase = 0.01 + (difficulty * 0.002);
            const gapSize = Math.max(0.2, 0.8 - (difficulty * 0.05));
            
            controlsDiv.innerHTML = `
                <div style="position: relative; width: 300px; height: 300px; margin: 0 auto;">
                    <canvas id="gameCanvas" width="300" height="300"></canvas>
                    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; color: var(--primary-color); font-size: 1.5rem; text-shadow: 0 0 5px var(--primary-color);">TAP TO LOCK</div>
                </div>
                <div class="terminal-text" style="margin-top: 20px;">ALIGN THE GAPS TO BREACH FIREWALL</div>
            `;

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            let rings = [];
            // Adjust spacing if many rings to fit in 140px radius
            const spacing = numRings > 4 ? 120 / numRings : 30;
            
            for (let i = 0; i < numRings; i++) {
                rings.push({
                    radius: 140 - (i * spacing), 
                    speed: speedBase * (1 + i * 0.3) * (i % 2 === 0 ? 1 : -1), // Reduced speed multiplier from 0.5 to 0.3
                    angle: Math.random() * Math.PI * 2,
                    gap: gapSize * (1 + i * 0.2), // Inner rings might have slightly larger gaps to compensate for speed
                    locked: false,
                    color: '#00f3ff'
                });
            }
            
            let currentRing = 0;
            let gameActive = true;
            let animationId;

            function draw() {
                if (!gameActive) return;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw Target Zone (Top) - IMPROVED VISIBILITY
                ctx.beginPath();
                // Draw a wedge or a clearer indicator at the top
                ctx.moveTo(centerX, centerY);
                // Arc from -PI/2 - 0.2 to -PI/2 + 0.2 (wider)
                ctx.arc(centerX, centerY, 150, -Math.PI/2 - 0.15, -Math.PI/2 + 0.15);
                ctx.fillStyle = 'rgba(255, 50, 50, 0.3)'; // Reddish tint for target zone
                ctx.fill();
                
                // Add a bright line in the center of the target zone
                ctx.beginPath();
                ctx.moveTo(centerX, centerY - 40);
                ctx.lineTo(centerX, centerY - 150);
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 4;
                ctx.stroke();
                
                // Draw Rings
                rings.forEach((ring, index) => {
                    ctx.beginPath();
                    // Draw the full circle except the gap
                    // Gap is centered at ring.angle
                    const start = ring.angle + ring.gap / 2;
                    const end = ring.angle + Math.PI * 2 - ring.gap / 2;
                    
                    ctx.arc(centerX, centerY, ring.radius, start, end);
                    
                    // HIGHLIGHT ACTIVE RING
                    if (ring.locked) {
                        ctx.strokeStyle = '#0f0'; // Green if locked
                    } else if (index === currentRing) {
                        ctx.strokeStyle = '#ffff00'; // Yellow if active
                    } else {
                        ctx.strokeStyle = 'rgba(0, 243, 255, 0.3)'; // Dimmed cyan if waiting
                    }
                    
                    ctx.lineWidth = 15;
                    ctx.stroke();
                    
                    // Update angle if not locked
                    if (!ring.locked) {
                        ring.angle += ring.speed;
                    }
                });
                
                animationId = requestAnimationFrame(draw);
            }
            
            draw();

            // Interaction
            canvas.addEventListener('click', () => {
                if (!gameActive) return;
                
                const ring = rings[currentRing];
                // Check alignment: Gap must be around -PI/2 (Top)
                // Normalize angle to 0-2PI
                let normAngle = ring.angle % (Math.PI * 2);
                if (normAngle < 0) normAngle += Math.PI * 2;
                
                // The gap center is at normAngle. We want normAngle to be close to -PI/2 (which is 3PI/2 or 4.71)
                // Actually, let's simplify. The gap is at `angle`. We draw from `angle + gap/2` to `angle - gap/2`.
                // So the "hole" is at `angle`.
                // We want the hole to be at the top (-PI/2).
                
                // Calculate distance from top
                const target = 1.5 * Math.PI; // 270 degrees
                const dist = Math.abs(normAngle - target);
                const dist2 = Math.abs((normAngle - Math.PI*2) - target); // Wrap around check
                
                // Check if gap overlaps with top needle
                // Gap width is `ring.gap`.
                // We need the top needle (at 3PI/2) to be INSIDE the gap.
                // Gap spans from [angle - gap/2] to [angle + gap/2].
                
                // Let's check if the "solid" part hits the needle.
                // Solid part is drawn. Gap is empty.
                // Wait, user said "align a hole". So we want the gap at the top.
                
                // Let's check if the angle is close to 3PI/2 (Top)
                // Tolerance is half the gap size.
                
                let diff = Math.abs(normAngle - target);
                if (diff > Math.PI) diff = Math.PI * 2 - diff; // Shortest path
                
                if (diff < ring.gap / 2) {
                    // Success
                    ring.locked = true;
                    currentRing++;
                    if (currentRing >= rings.length) {
                        gameActive = false;
                        cancelAnimationFrame(animationId);
                        socket.emit('player_minigame_result', { success: true });
                        
                        // Sequence:
                        // 1. Server sends 'player_hacking_update' (Password Revealed) -> Client renders it automatically.
                        // 2. Wait 2s.
                        // 3. Show ACCESS GRANTED (Cyber Style).
                        // 4. Wait 2s.
                        // 5. Reset to Home.
                        
                        setTimeout(() => {
                            controlsDiv.innerHTML = `
                                <div class="success-box">
                                    <h1 style="color: #0f0; font-size: 3.5rem; text-shadow: 0 0 20px #0f0; margin: 0;">ACCESS GRANTED</h1>
                                    <div style="font-size: 1.2rem; color: #0f0; margin-top: 20px; letter-spacing: 5px;">SYSTEM OVERRIDE COMPLETE</div>
                                </div>
                            `;
                            
                            setTimeout(() => {
                                controlsDiv.innerHTML = '<div class="terminal-text">> SYSTEM NORMAL<br>> STANDBY...</div>';
                                setNavEnabled(true);
                            }, 2000);
                        }, 2000);
                    }
                } else {
                    // Fail
                    gameActive = false;
                    cancelAnimationFrame(animationId);
                    socket.emit('player_minigame_result', { success: false });
                    controlsDiv.innerHTML = '<h1 style="color: red; font-size: 3rem;">BREACH DETECTED</h1>';
                    setTimeout(() => setNavEnabled(true), 2000);
                }
            });
        }

        function renderKeypad() {
            controlsDiv.innerHTML = '<div class="terminal-text">> SECURITY OVERRIDE REQUIRED</div>';
            
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = 'INITIATE UNLOCK';
            btn.onclick = () => {
                socket.emit('player_action', { action: 'unlock_attempt', code: '1234', charId: myCharacter ? myCharacter.id : 'unknown' });
                btn.innerText = 'UPLOADING...';
                btn.disabled = true;
                setTimeout(() => {
                    btn.innerText = 'INITIATE UNLOCK';
                    btn.disabled = false;
                }, 2000);
            };
            controlsDiv.appendChild(btn);
        }

        // --- SCREEN & NAV LOGIC ---
        let currentScreen = 'home';
        let navEnabled = true;

        function switchScreen(screenId) {
            if (!navEnabled) return;
            if (screenId === currentScreen) return;

            // Hide all screens
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            // Show target
            document.getElementById('screen-' + screenId).classList.add('active');
            
            // Update Nav
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + screenId).classList.add('active');
            
            currentScreen = screenId;

            // If switching to comms, reset badge if we are just viewing list? 
            // No, badge clears when opening specific chat.
        }

        function setNavEnabled(enabled) {
            navEnabled = enabled;
            const nav = document.getElementById('bottom-nav');
            if (enabled) {
                nav.style.opacity = '1';
                nav.style.pointerEvents = 'all';
            } else {
                nav.style.opacity = '0.3';
                nav.style.pointerEvents = 'none';
                // Force switch to home if minigame starts?
                // Usually minigame starts in home screen (controlsDiv)
                if (currentScreen !== 'home') {
                    // Force switch without check
                    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                    document.getElementById('screen-home').classList.add('active');
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    document.getElementById('nav-home').classList.add('active');
                    currentScreen = 'home';
                }
            }
        }

        // --- CHAT LOGIC ---
        let activeChat = null; // 'global', etc.
        let unreadCounts = { global: 0 };

        function openChat(chatId) {
            activeChat = chatId;
            document.getElementById('contact-list-view').style.display = 'none';
            document.getElementById('chat-view').classList.add('active');
            document.getElementById('chat-title').innerText = chatId === 'global' ? 'GLOBAL FREQUENCY' : chatId;
            
            // Clear badge
            unreadCounts[chatId] = 0;
            updateBadges();
            
            renderMessages(); 
        }

        function closeChat() {
            activeChat = null;
            document.getElementById('chat-view').classList.remove('active');
            document.getElementById('contact-list-view').style.display = 'flex';
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value;
            if (msg) {
                const senderName = myCharacter ? myCharacter.name : 'GUEST';
                // Send channel info
                socket.emit('chat_message', { sender: senderName, text: msg, channel: activeChat || 'global' });
                input.value = '';
            }
        }

        let allMessages = [];

        function renderMessages() {
            const log = document.getElementById('chat-messages');
            log.innerHTML = '';
            
            // Filter by active channel
            const currentChannel = activeChat || 'global';
            const filtered = allMessages.filter(m => (m.channel || 'global') === currentChannel);
            
            filtered.forEach(msg => {
                const isMe = myCharacter && msg.sender === myCharacter.name;
                const isGM = msg.isAdmin || msg.sender === 'GM';
                
                const div = document.createElement('div');
                // Use 'me' class if it's my message, otherwise 'player' or 'gm'
                let typeClass = 'player';
                if (isGM) typeClass = 'gm';
                if (isMe) typeClass = 'me';

                div.className = 'chat-msg ' + typeClass;
                
                // Use gameTime if available
                let timeStr = '';
                if (msg.gameTime) {
                    timeStr = msg.gameTime;
                } else {
                    timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }
                
                div.innerHTML = `
                    <div class="sender">${msg.sender} <span style="font-weight:normal; font-size:0.7rem;">[${timeStr}]</span></div>
                    <div class="text">${msg.text}</div>
                `;
                log.appendChild(div);
            });
            log.scrollTop = log.scrollHeight;
        }

        function updateBadges() {
            // Global Badge
            const badge = document.getElementById('badge-global');
            if (unreadCounts.global > 0) {
                badge.innerText = unreadCounts.global;
                badge.classList.add('visible');
            } else {
                badge.classList.remove('visible');
            }

            // Other Channels Badges
            document.querySelectorAll('.contact-item').forEach(item => {
                const channelId = item.getAttribute('data-channel');
                if (channelId && channelId !== 'global') {
                    const b = item.querySelector('.unread-badge');
                    if (unreadCounts[channelId] > 0) {
                        b.innerText = unreadCounts[channelId];
                        b.classList.add('visible');
                    } else {
                        b.classList.remove('visible');
                    }
                }
            });

            // Nav Badge (Sum of all)
            const total = Object.values(unreadCounts).reduce((a, b) => a + b, 0);
            const navBadge = document.getElementById('nav-badge');
            if (total > 0) {
                navBadge.innerText = '!';
                navBadge.style.display = 'inline-flex';
            } else {
                navBadge.style.display = 'none';
            }
        }

        socket.on('conversations_update', (convs) => {
            conversations = convs;
            processChannels();
        });

        function renderContactList(channelData) {
            const list = document.querySelector('.contact-list');
            list.innerHTML = ''; // Clear

            channelData.forEach(data => {
                const channelId = data.id;
                const lastMsg = data.lastMsg;
                
                const item = document.createElement('div');
                item.className = 'contact-item';
                item.setAttribute('data-channel', channelId);
                item.onclick = () => openChat(channelId);
                
                // Determine Display Name
                let displayName = channelId;
                if (channelId === 'global') displayName = 'GLOBAL FREQUENCY';
                else {
                    const group = conversations.find(c => c.id === channelId);
                    if (group) {
                        displayName = group.name;
                    } else if (channelId.startsWith('dm_')) {
                        const parts = channelId.split('_');
                        const p1 = parts[1];
                        const p2 = parts[2];
                        if (myCharacter) {
                            if (myCharacter.name === p1 || myCharacter.username === p1) displayName = p2;
                            else if (myCharacter.name === p2 || myCharacter.username === p2) displayName = p1;
                            else displayName = p1; 
                        } else {
                            displayName = p1 + ' / ' + p2;
                        }
                    }
                }

                item.innerHTML = `
                    <div style="flex: 1;">
                        <div class="contact-name">${displayName}</div>
                        <div class="last-msg">${lastMsg ? lastMsg.text : ''}</div>
                    </div>
                    <div class="unread-badge"></div>
                `;
                list.appendChild(item);
            });
            
            updateBadges();
        }

        function processChannels() {
            if (!myCharacter) return; 
            
            const validChannels = new Set();
            validChannels.add('global');

            // 1. Groups I'm in
            conversations.forEach(c => {
                if (c.participants.includes(myCharacter.username) || c.participants.includes(myCharacter.name)) {
                    validChannels.add(c.id);
                }
            });

            // 2. DMs I'm in (from history)
            allMessages.forEach(m => {
                if (m.channel && m.channel.startsWith('dm_')) {
                    const parts = m.channel.split('_');
                    if (parts.includes(myCharacter.username) || parts.includes(myCharacter.name)) {
                        validChannels.add(m.channel);
                    }
                }
                // Fallback: If I sent a message in ANY channel, I should see it
                if (m.sender === myCharacter.name || m.sender === myCharacter.username) {
                    if (m.channel) validChannels.add(m.channel);
                }
            });
            
            // 3. Calculate last message time for each channel
            const channelData = [];
            validChannels.forEach(c => {
                const msgs = allMessages.filter(m => (m.channel || 'global') === c);
                const lastMsg = msgs[msgs.length - 1];
                const lastTime = lastMsg ? new Date(lastMsg.timestamp).getTime() : 0;
                channelData.push({ id: c, lastMsg, lastTime });
            });

            // 4. Sort by time desc
            channelData.sort((a, b) => b.lastTime - a.lastTime);

            // 5. Render
            renderContactList(channelData);
        }

        socket.on('chat_update', (msg) => {
            allMessages.push(msg);
            if (allMessages.length > 100) allMessages.shift();

            const msgChannel = msg.channel || 'global';

            // FILTER: Check if I should see this message
            let allowed = false;
            if (msgChannel === 'global') allowed = true;
            else if (msgChannel.startsWith('dm_')) {
                if (myCharacter && (msgChannel.includes(myCharacter.username) || msgChannel.includes(myCharacter.name))) allowed = true;
            } else {
                // Group
                const group = conversations.find(c => c.id === msgChannel);
                if (group && myCharacter && (group.participants.includes(myCharacter.username) || group.participants.includes(myCharacter.name))) {
                    allowed = true;
                }
            }

            if (!allowed) return; // Ignore message

            // Update preview if it's global
            if (msgChannel === 'global') {
                const preview = document.getElementById('preview-global');
                if (preview) preview.innerText = msg.sender + ': ' + msg.text;
            }
            
            // Re-process channels to update order and list
            processChannels();

            // If not in this chat, increment badge
            if (activeChat !== msgChannel || currentScreen !== 'comms') {
                 if (!unreadCounts[msgChannel]) unreadCounts[msgChannel] = 0;
                 unreadCounts[msgChannel]++;
                 updateBadges();
            } else {
                renderMessages();
            }
        });

        socket.on('chat_history', (history) => {
            allMessages = history;
            processChannels();
            
            if (activeChat) renderMessages();
            
            const lastGlobal = history.filter(m => (m.channel || 'global') === 'global').pop();
            if (lastGlobal) {
                const preview = document.getElementById('preview-global');
                if (preview) preview.innerText = lastGlobal.sender + ': ' + lastGlobal.text;
            }
        });

        // Hook into login to refresh channel names
        socket.off('login_success');
        socket.on('login_success', (charData) => {
            myCharacter = charData;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('char-name-display').innerText = charData.name.toUpperCase();
            
            const menuName = document.getElementById('menu-char-name');
            if (menuName) menuName.innerText = charData.name.toUpperCase();
            
            updateStats(charData);
            
            // Process channels now that we know who we are
            processChannels();
        });

        // --- TIME LOGIC ---
        let scrambleTimeout = null;
        let lastTimeState = null;

        function runScramble() {
            if (!lastTimeState || !lastTimeState.scrambled) return;
            
            const display = document.getElementById('header-time');
            const dateStr = `${lastTimeState.year}-${String(lastTimeState.day).padStart(3, '0')} ${String(lastTimeState.hour).padStart(2, '0')}:${String(lastTimeState.minute).padStart(2, '0')}`;
            
            let glitchText = '';
            for (let char of dateStr) {
                // Only scramble some digits (30% chance)
                if (/[0-9]/.test(char) && Math.random() > 0.7) {
                    glitchText += Math.floor(Math.random() * 10);
                } else {
                    glitchText += char;
                }
            }
            display.innerText = glitchText;
            
            // Random delay between 50ms and 250ms
            const delay = Math.random() * 200 + 50;
            scrambleTimeout = setTimeout(runScramble, delay);
        }

        socket.on('time_update', (time) => {
            lastTimeState = time;
            const display = document.getElementById('header-time');
            
            if (time.scrambled) {
                display.style.color = 'red';
                display.style.textShadow = '2px 0 red, -2px 0 blue';
                
                if (!scrambleTimeout) {
                    runScramble();
                }
            } else {
                if (scrambleTimeout) {
                    clearTimeout(scrambleTimeout);
                    scrambleTimeout = null;
                }
                
                display.style.color = 'var(--primary-color)';
                display.style.textShadow = 'none';
                const dateStr = `${time.year}-${String(time.day).padStart(3, '0')} ${String(time.hour).padStart(2, '0')}:${String(time.minute).padStart(2, '0')}`;
                display.innerText = dateStr;
            }
        });
    </script>
</body>
</html>
