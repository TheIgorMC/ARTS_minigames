<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>GM Control Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #0f0f15;
            --border-color: #333;
            --accent-color: #00d2ff;
            --text-color: #eee;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: grid;
            grid-template-rows: 60px 1fr;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--accent-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; }
        .tab-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: #888;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--accent-color); border-color: var(--accent-color); }
        .tab-btn.active {
            background: rgba(0, 210, 255, 0.1);
            color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        /* Main Layout */
        main {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 350px; /* Main content + Sidebar */
            gap: 20px;
            height: calc(100vh - 100px);
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
        }

        /* Time & Chat */
        .time-display {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--accent-color);
            padding: 10px;
            background: #000;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-log {
            flex: 1;
            border: 1px solid #333;
            background: #000;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .chat-msg { margin-bottom: 5px; }
        .chat-msg .sender { color: var(--accent-color); font-weight: bold; }
        .chat-msg .time { color: #666; font-size: 0.8rem; margin-right: 5px; }

        h2 { margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; color: var(--accent-color); }

        /* Controls Grid */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        button.action-btn {
            background: #1a1a24;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 15px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button.action-btn:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-color);
        }
        button.action-btn.danger { border-color: #ff3333; color: #ff3333; }
        button.action-btn.danger:hover { background: #ff3333; color: #000; box-shadow: 0 0 15px #ff3333; }

        /* Log */
        #log {
            font-size: 0.9rem;
            color: #aaa;
            height: 100%;
            overflow-y: auto;
            font-family: monospace;
        }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .log-time { color: #555; margin-right: 5px; }

        /* Database Editors */
        .db-editor {
            width: 100%;
            height: 400px;
            background: #000;
            color: #0f0;
            border: 1px solid #333;
            font-family: monospace;
            padding: 10px;
            resize: none;
        }

        /* Utility classes */
        .hidden { display: none !important; }
        .full-width { grid-column: 1 / -1; }

        /* Sidebar */
        #sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <header>
        <h1>Starfinder GM Station</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('live')">Live Ops</button>
            <button class="tab-btn" onclick="switchTab('map')">Map</button>
            <button class="tab-btn" onclick="switchTab('database')">Database</button>
        </div>
    </header>

    <main>
        <!-- LEFT COLUMN: CONTENT -->
        <div id="tab-live" class="panel">
            
            <!-- TIME CONTROL -->
            <div style="margin-bottom: 30px; border: 1px solid #333; padding: 15px;">
                <h3 style="margin-top: 0;">System Time</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="number" id="time-year" placeholder="Year" style="width: 60px; padding: 5px; background: #111; color: #fff; border: 1px solid #444;">
                    <input type="number" id="time-day" placeholder="Day" style="width: 50px; padding: 5px; background: #111; color: #fff; border: 1px solid #444;">
                    <input type="number" id="time-hour" placeholder="HH" style="width: 40px; padding: 5px; background: #111; color: #fff; border: 1px solid #444;">
                    <input type="number" id="time-min" placeholder="MM" style="width: 40px; padding: 5px; background: #111; color: #fff; border: 1px solid #444;">
                    <button class="action-btn" style="padding: 5px 10px;" onclick="setTime()">SET</button>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label><input type="checkbox" id="scramble-check" onchange="toggleScramble()"> SCRAMBLE (Disturbance)</label>
                </div>
            </div>

            <h2>Hacking Control</h2>
            <div style="margin-bottom: 20px; border: 1px solid var(--accent-color); padding: 10px;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="hack-pwd" placeholder="Secret Password" style="flex: 2; padding: 10px; background: #111; color: #fff; border: 1px solid var(--border-color); font-family: inherit;">
                    <div style="display: flex; gap: 5px; flex: 1;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; color: #888;">DC</label>
                            <input type="number" id="hack-dc" placeholder="DC" value="15" style="width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid var(--border-color); font-family: inherit;">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; color: #888;">Complexity (Rings)</label>
                            <input type="number" id="hack-complexity" placeholder="Complexity" value="3" style="width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid var(--border-color); font-family: inherit;">
                        </div>
                    </div>
                    <button class="action-btn" onclick="startHacking()" style="margin-top: 20px;">START</button>
                    <button class="action-btn danger" onclick="stopHacking()" style="margin-top: 20px;">STOP</button>
                </div>
                
                <div id="hack-active-controls" style="display: none;">
                    <h3 style="color: #fff; margin: 10px 0;">Active Session</h3>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <div id="hack-status" style="font-size: 1.2rem; letter-spacing: 3px; color: var(--accent-color); flex: 1;">******</div>
                        <input type="number" id="hack-roll" placeholder="Roll Result" style="width: 80px; padding: 10px; background: #111; color: #fff; border: 1px solid var(--border-color); font-family: inherit;">
                        <button class="action-btn" onclick="processHackRoll()">CHECK</button>
                    </div>
                </div>
            </div>

            <h2>Table Control (Projector)</h2>
            <div class="controls-grid">
                <button class="action-btn" onclick="triggerScene('hacking')">SCENARIO: HACKING</button>
                <button class="action-btn danger" onclick="triggerScene('reset')">RESET TABLE</button>
            </div>

            <h2 style="margin-top: 30px;">Mood Display (Tablet)</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <select id="mood-select" style="flex: 1; padding: 10px; background: #111; color: #fff; border: 1px solid var(--border-color); font-family: inherit;">
                    <option value="">Select Image...</option>
                </select>
                <button class="action-btn" onclick="setMood()">SET MOOD</button>
                <button class="action-btn danger" onclick="clearMood()">CLEAR</button>
            </div>

            <h2 style="margin-top: 30px;">Player Control (Mobile)</h2>
            <div class="controls-grid">
                <button class="action-btn" onclick="triggerPlayer('hacking_keypad')">DEPLOY: KEYPAD</button>
                <button class="action-btn" onclick="triggerPlayer('info_dump')">DEPLOY: INTEL</button>
                <button class="action-btn danger" onclick="triggerPlayer('alert')">ALERT: RED</button>
                <button class="action-btn" onclick="triggerPlayer('reset')">RESET PLAYERS</button>
            </div>
        </div>

        <div id="tab-map" class="panel hidden">
            <h2>Map Management</h2>
            
            <div style="margin-bottom: 20px;">
                <h3>Live Preview</h3>
                <div style="border: 2px solid var(--accent-color); height: 300px; overflow: hidden; position: relative;">
                    <iframe src="/" style="width: 1920px; height: 1080px; border: 0; transform: scale(0.25); transform-origin: 0 0;"></iframe>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <h3>Spawn Object</h3>
                <div style="display: flex; gap: 10px;">
                    <select id="spawn-obj-select" style="flex: 1; padding: 10px; background: #111; color: var(--accent-color); border: 1px solid var(--border-color); font-family: inherit;">
                        <option value="">Select Object...</option>
                    </select>
                    <button class="action-btn" onclick="spawnObject()">Spawn</button>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <h3>Scenes</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="scene-name" placeholder="Scene Name" style="flex: 1; padding: 10px; background: #111; color: #fff; border: 1px solid var(--border-color); font-family: inherit;">
                    <button class="action-btn" onclick="saveScene()">Save Current</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <select id="scene-select" style="flex: 1; padding: 10px; background: #111; color: var(--accent-color); border: 1px solid var(--border-color); font-family: inherit;">
                        <option value="">Select Scene...</option>
                    </select>
                    <button class="action-btn" onclick="loadScene()">Load</button>
                    <button class="action-btn" onclick="resetSceneFilter()">Show All</button>
                    <button class="action-btn danger" onclick="deleteScene()">Del</button>
                </div>
            </div>
            
            <div style="margin-bottom: 20px;">
                <h3>Table Actions</h3>
                <button class="action-btn danger" onclick="clearTable()">Clear Table</button>
            </div>
        </div>

        <div id="tab-database" class="panel hidden">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 100%;">
                <div style="display: flex; flex-direction: column;">
                    <h3>OBJECTS DB</h3>
                    <textarea id="json-objects" class="db-editor"></textarea>
                    <button class="action-btn" style="margin-top: 10px;" onclick="saveData('objects')">SAVE OBJECTS</button>
                </div>
                <div style="display: flex; flex-direction: column;">
                    <h3>CHARACTERS DB</h3>
                    <textarea id="json-characters" class="db-editor"></textarea>
                    <button class="action-btn" style="margin-top: 10px;" onclick="saveData('characters')">SAVE CHARACTERS</button>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN: SIDEBAR -->
        <div id="sidebar">
            <div class="panel" style="flex: 1; display: flex; flex-direction: column;">
                <h3>COMMS LOG</h3>
                <div class="time-display" id="gm-time-display">--:--</div>
                <div id="chat-log" class="chat-log"></div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <input type="text" id="chat-alias" placeholder="Sender (Default: GM)" value="GM" style="padding: 5px; background: #222; color: var(--accent-color); border: 1px solid #444; font-weight: bold;">
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="chat-input" placeholder="Message..." style="flex: 1; padding: 5px; background: #111; color: #fff; border: 1px solid #444;">
                        <button class="action-btn" style="padding: 5px 10px;" onclick="sendChat()">SEND</button>
                    </div>
                </div>
            </div>
            
            <div class="panel" style="height: 200px;">
                <h3>System Log</h3>
                <div id="log"></div>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        
        // Identificati come GM
        socket.emit('join', 'gm');

        // --- TABS ---
        function switchTab(tabName) {
            document.querySelectorAll('.panel').forEach(p => {
                if(p.id.startsWith('tab-')) p.classList.add('hidden');
            });
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        // --- COMMANDS ---
        function triggerScene(type) {
            socket.emit('gm_change_scene', { type: type });
            log('CMD TABLE: ' + type);
        }

        function triggerPlayer(type) {
            socket.emit('gm_player_command', { type: type });
            log('CMD PLAYER: ' + type);
        }

        // --- LOGGING ---
        socket.on('player_feedback', (data) => {
            log(`FEEDBACK [${data.charId || 'UNK'}]: ${data.action}`);
        });

        function log(msg) {
            const div = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            div.innerHTML += `<div class="log-entry"><span class="log-time">[${time}]</span> ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }

        let currentSceneId = null;
        let cachedData = null;

        // --- DATABASE ---
        socket.on('admin_data_update', (data) => {
            cachedData = data;
            document.getElementById('json-objects').value = JSON.stringify(data.objects, null, 2);
            document.getElementById('json-characters').value = JSON.stringify(data.characters, null, 2);
            
            updateSpawnSelect();

            // Populate Scenes Select
            const sceneSelect = document.getElementById('scene-select');
            sceneSelect.innerHTML = '<option value="">Select Scene...</option>';
            if (data.scenes) {
                data.scenes.forEach(scene => {
                    const opt = document.createElement('option');
                    opt.value = scene.id;
                    opt.innerText = scene.name + ' (' + scene.objects.length + ' objs)';
                    sceneSelect.appendChild(opt);
                });
            }
        });

        function updateSpawnSelect() {
            if (!cachedData) return;
            
            const select = document.getElementById('spawn-obj-select');
            select.innerHTML = '<option value="">Select Object...</option>';
            
            // Group by Category
            const categories = {};
            cachedData.objects.forEach(obj => {
                // Filter by Scene ID if active
                if (currentSceneId && obj.sceneId && obj.sceneId !== currentSceneId) return;

                const cat = obj.category || 'Uncategorized';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(obj);
            });

            Object.keys(categories).sort().forEach(cat => {
                const group = document.createElement('optgroup');
                group.label = cat;
                categories[cat].forEach(obj => {
                    const opt = document.createElement('option');
                    opt.value = obj.id;
                    opt.innerText = obj.name;
                    group.appendChild(opt);
                });
                select.appendChild(group);
            });
        }

        function saveData(type) {
            try {
                let content;
                if (type === 'objects') {
                    content = JSON.parse(document.getElementById('json-objects').value);
                } else {
                    content = JSON.parse(document.getElementById('json-characters').value);
                }
                socket.emit('admin_update_data', { type: type, content: content });
                log('DB SAVED: ' + type);
            } catch (e) {
                alert('JSON Error: ' + e.message);
            }
        }

        // --- MAP MANAGEMENT ---
        function spawnObject() {
            const objId = document.getElementById('spawn-obj-select').value;
            if (!objId) return;
            socket.emit('admin_map_action', { type: 'spawn', objectId: objId });
            log('SPAWN: ' + objId);
        }

        function saveScene() {
            const name = document.getElementById('scene-name').value;
            if (!name) return alert('Enter a scene name');
            socket.emit('admin_scene_action', { type: 'save', name: name });
            log('SCENE SAVED: ' + name);
        }

        function loadScene() {
            const id = document.getElementById('scene-select').value;
            if (!id) return;
            if(confirm('Load scene? Current table will be overwritten.')) {
                socket.emit('admin_scene_action', { type: 'load', id: id });
                currentSceneId = id;
                updateSpawnSelect();
                log('SCENE LOADED: ' + id);
            }
        }

        function resetSceneFilter() {
            currentSceneId = null;
            updateSpawnSelect();
            log('FILTER RESET');
        }

        function deleteScene() {
            const id = document.getElementById('scene-select').value;
            if (!id) return;
            if(confirm('Delete this scene permanently?')) {
                socket.emit('admin_scene_action', { type: 'delete', id: id });
                log('SCENE DELETED');
            }
        }

        function clearTable() {
            if(confirm('Clear all objects from table?')) {
                socket.emit('admin_map_action', { type: 'clear' });
                log('TABLE CLEARED');
            }
        }

        // --- HACKING ---
        function startHacking() {
            const pwd = document.getElementById('hack-pwd').value;
            const dc = document.getElementById('hack-dc').value;
            const complexity = document.getElementById('hack-complexity').value;
            if (!pwd) return alert('Enter password');
            socket.emit('gm_hacking_action', { type: 'start', password: pwd, dc: dc, complexity: complexity });
            document.getElementById('hack-active-controls').style.display = 'block';
            log('HACK START: ' + pwd);
        }

        function stopHacking() {
            socket.emit('gm_hacking_action', { type: 'stop' });
            document.getElementById('hack-active-controls').style.display = 'none';
            log('HACK STOP');
        }

        function processHackRoll() {
            const roll = document.getElementById('hack-roll').value;
            if (!roll) return;
            socket.emit('gm_hacking_action', { type: 'check', roll: roll });
            document.getElementById('hack-roll').value = '';
            log('HACK CHECK: ' + roll);
        }

        // --- MOOD ---
        function setMood() {
            const filename = document.getElementById('mood-select').value;
            if (filename) {
                const url = '/media/' + filename;
                socket.emit('admin_mood_action', { type: 'set', url: url });
                log('MOOD SET: ' + filename);
            }
        }

        function clearMood() {
            socket.emit('admin_mood_action', { type: 'set', url: '' });
            document.getElementById('mood-select').value = '';
            log('MOOD CLEARED');
        }

        // --- TIME & CHAT ---
        function setTime() {
            const y = document.getElementById('time-year').value;
            const d = document.getElementById('time-day').value;
            const h = document.getElementById('time-hour').value;
            const m = document.getElementById('time-min').value;
            socket.emit('admin_time_action', { type: 'set', year: y, day: d, hour: h, minute: m });
        }

        function toggleScramble() {
            const val = document.getElementById('scramble-check').checked;
            socket.emit('admin_time_action', { type: 'scramble', value: val });
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const aliasInput = document.getElementById('chat-alias');
            const msg = input.value;
            const sender = aliasInput.value || 'GM';
            
            if (msg) {
                socket.emit('chat_message', { sender: sender, text: msg });
                input.value = '';
            }
        }

        socket.on('time_update', (time) => {
            document.getElementById('time-year').value = time.year;
            document.getElementById('time-day').value = time.day;
            document.getElementById('time-hour').value = time.hour;
            document.getElementById('time-min').value = time.minute;
            document.getElementById('scramble-check').checked = time.scrambled;
            
            const display = `${time.year}-${String(time.day).padStart(3, '0')} ${String(time.hour).padStart(2, '0')}:${String(time.minute).padStart(2, '0')}`;
            document.getElementById('gm-time-display').innerText = display;
        });

        socket.on('chat_update', (msg) => {
            const log = document.getElementById('chat-log');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `<span class="time">[${timeStr}]</span> <span class="sender">${msg.sender}:</span> ${msg.text}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        });
        
        socket.on('chat_history', (history) => {
            const log = document.getElementById('chat-log');
            log.innerHTML = '';
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'chat-msg';
                const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                div.innerHTML = `<span class="time">[${timeStr}]</span> <span class="sender">${msg.sender}:</span> ${msg.text}`;
                log.appendChild(div);
            });
            log.scrollTop = log.scrollHeight;
        });

        socket.on('media_list_update', (files) => {
            const select = document.getElementById('mood-select');
            select.innerHTML = '<option value="">Select Image...</option>';
            files.forEach(file => {
                const opt = document.createElement('option');
                opt.value = file;
                opt.innerText = file;
                select.appendChild(opt);
            });
        });

        socket.on('gm_hacking_update', (state) => {
            // Visualizza lo stato attuale (lettere scoperte)
            let display = '';
            for (let i = 0; i < state.password.length; i++) {
                if (state.revealedIndices.includes(i) || state.password[i] === ' ') {
                    display += state.password[i];
                } else {
                    display += '_';
                }
            }
            document.getElementById('hack-status').innerText = display.split('').join(' ');
        });
    </script>
</body>
</html>
