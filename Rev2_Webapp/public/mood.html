<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Display</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        .mood-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .mood-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }
        .mood-layer.active {
            opacity: 1;
            z-index: 2;
        }
        #placeholder {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            font-family: monospace;
            font-size: 2rem;
            z-index: 0;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="placeholder">WAITING FOR SIGNAL...</div>
    <div class="mood-container">
        <img id="mood-1" class="mood-layer" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
        <img id="mood-2" class="mood-layer" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
    </div>

    <script>
        const socket = io();
        const img1 = document.getElementById('mood-1');
        const img2 = document.getElementById('mood-2');
        const placeholder = document.getElementById('placeholder');
        
        let activeImg = 1; // 1 or 2

        // Check for URL params (for Admin Preview)
        const urlParams = new URLSearchParams(window.location.search);
        const previewImg = urlParams.get('img');

        if (previewImg) {
            // Preview Mode: Show image immediately, disable socket
            console.log('Preview Mode:', previewImg);
            img1.src = previewImg;
            img1.classList.add('active');
            placeholder.style.display = 'none';
            // Don't connect socket listeners for updates if in preview mode
        } else {
            // Normal Mode
            socket.on('connect', () => {
                console.log('Connected to server as Mood Display');
                socket.emit('join', 'mood');
            });

            socket.on('mood_state_update', (url) => {
                console.log('Received mood update:', url);
                updateMood(url);
            });
        }

        function updateMood(url) {
            const current = activeImg === 1 ? img1 : img2;
            const next = activeImg === 1 ? img2 : img1;
            
            if (url) {
                // Preload image
                const tempImg = new Image();
                tempImg.onload = () => {
                    next.src = url;
                    next.classList.add('active');
                    current.classList.remove('active');
                    placeholder.style.display = 'none';
                    activeImg = activeImg === 1 ? 2 : 1;
                };
                tempImg.src = url;
            } else {
                // Fade out to black/placeholder
                current.classList.remove('active');
                next.classList.remove('active');
                setTimeout(() => {
                    placeholder.style.display = 'flex';
                }, 1500);
            }
        }
    </script>
</body>
</html>
